name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      versionCode: ${{ steps.bump.outputs.versionCode }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next version from latest tag
        id: bump
        run: |
          set -euo pipefail
          latest_tag=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1 || true)
          if [ -z "$latest_tag" ]; then
            base_version="0.0.0"
          else
            base_version="${latest_tag#v}"
          fi
          IFS='.' read -r major minor patch <<< "$base_version"
          new_version="${major}.${minor}.$((patch + 1))"
          new_code=$(git tag --list 'v*.*.*' | wc -l | tr -d ' ')
          new_code=$((new_code + 1))
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "versionCode=${new_code}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Releasing: ${base_version} -> ${new_version} (code ${new_code})"

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: main
            suffix: ""
          - branch: dev
            suffix: "-dev"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 1

      - name: Align version for build
        run: |
          set -euo pipefail
          version="${{ needs.bump-version.outputs.version }}${{ matrix.suffix }}"
          code="${{ needs.bump-version.outputs.versionCode }}"
          sed -i -E "s/(versionName\s*=\s*)\"[^\"]+\"/\1\"${version}\"/" app/build.gradle.kts
          sed -i -E "s/(versionCode\s*=\s*)[0-9]+/\1${code}/" app/build.gradle.kts
          grep -E 'versionName|versionCode' app/build.gradle.kts

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Stage APK with release name
        run: |
          set -euo pipefail
          mkdir -p release
          src=$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)
          if [ "${{ matrix.branch }}" = "main" ]; then
            dest="release/anyapk-${{ needs.bump-version.outputs.version }}.apk"
          else
            dest="release/anyapk-dev-${{ needs.bump-version.outputs.version }}.apk"
          fi
          cp "$src" "$dest"
          ls -la release/

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.branch }}
          path: release/*.apk
          retention-days: 7
          if-no-files-found: error

  release:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download main APK
        uses: actions/download-artifact@v4
        with:
          name: apk-main
          path: release

      - name: Download dev APK
        uses: actions/download-artifact@v4
        with:
          name: apk-dev
          path: release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}
          name: v${{ needs.bump-version.outputs.version }}
          target_commitish: ${{ needs.bump-version.outputs.sha }}
          generate_release_notes: true
          files: |
            release/anyapk-${{ needs.bump-version.outputs.version }}.apk
            release/anyapk-dev-${{ needs.bump-version.outputs.version }}.apk
